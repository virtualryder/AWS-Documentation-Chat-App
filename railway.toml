[build]
builder = "nixpacks"

[deploy]
# startup_ingest.py runs in the background (&) so the app starts immediately.
# On first boot it indexes all 30 primary AWS services (~15-20 min).
# On every subsequent restart it exits in <1 second (DB already populated).
startCommand = "python startup_ingest.py & streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
